name=SD_FTP_Server
version=1.0.0
author=Dean Gienger
maintainer=Dean Gienger <deangienger@yahoo.com>
sentence=Minimal passive/active FTP server exposing an SD_MMC card.
paragraph=Single-client FTP server for ESP32-S3. Backs storage with POSIX VFS so it works around arduino-esp32 SD_MMC root-listing bug #8870. Supports PASV (FileZilla, WinSCP) and PORT (Windows cmd.exe ftp). Implements USER, PASS, SYST, FEAT, OPTS, NOOP, TYPE, PWD, CWD, CDUP, PASV, PORT, LIST, NLST, RETR, STOR, APPE, DELE, MKD, RMD, RNFR, RNTO, QUIT.
category=Communication
url=https://github.com/deangi/vAppleII
architectures=esp32
includes=SD_FTP_Server.h
