#Dean's 11/40
set console log=./console.log
set cpu 11/40, 256K
set cpu idle
set tto 8b
;set console telnet=10000

set dz disable
set rp disable
set tm disable
set tq disable
set lpt disable
set ptp disable
set ptr disable

Set hk enable
Set rp enable
Set rp0 enable
Set rp0 RP06
Set rp0 noautosize
Attach rp0 1140_rp0.rp6
Set rp0 write enabled

set rq0 autosize
set rq0 writeenabled
attach rq0 rsx11m48_1140.dsk
set rq1 autosize
set rq1 writeenabled
attach rq1 rsxm70.dsk
set rq2 autosize
set rq2 writeenabled
attach rq2 bas11v201.dsk

set rq3 autosize

set rl enable
set rl0 rl02
attach rl0 rsxdl0.rl02
set rl1 l02
attach rl1 rsxdl1.rl02
set rl2 rl02
attach rl2 games.rl02
;attach rl2 rsxdl2.rl02
set rl3 rl02
;attach rl3 rtuser.rl02
attach rl3 rsxdl3.rl02

set rk enable
set rk0 rk05
attach rk0 rsx31wStr11andFtn.dsk
set rk1 rk05
attach rk1 F4RSX_V2.2.dsk

set rx disable
set ry disable

set dli enable
set DLI LINES=1
set dli address=17776500
set dli vec=300
attach dli 10001

;set dz enable
;set dz lines=8
;attach dz 10001
;sho dz

Set pclk enable
Set pclk vec=104

sho clk
sho dev
sho cpu
sho rq
