; vpdp1170 PDP-11 configuration
; Copy this to pdpconfig-NAME.ini to create a named variant
; (then pick it from the Settings -> PDP Config menu).

[system]
title   = PDP 11 - RSX11M
mem_size_kw = 2048

[telnet]
enabled = true
port    = 23

[console]
boot_input = ""

[diag]
; pcping      = seconds between host's periodic PC/register dump
;               to USB-Serial. 0 disables it (so do large values).
; v4b_quirks  = absorb KE11-A (0o772100..0o772176) and TT1
;               (0o776500..0o776516) probes silently. Default
;               true makes RSTS/E V4B + RT-11 + V6 + XXDP boot;
;               set false to attempt RSTS/E V7 (V4B will not
;               boot in that mode).
; kwp_enabled = activate the KW11-P programmable real-time clock
;               at 0o772540. Default false (stub mode) because
;               RSTS V4B sees a working KW11-P and programs it
;               for interrupts that break its terminal echo
;               (upper case shows as lower case). Set true only
;               for RSTS V7 hardware-test bring-up.
; tty_trace   = LOG every byte delivered to the KL11 TKB. Helps
;               diagnose burst-input ordering (the LOG line shares
;               the USB-Serial channel with guest echo so the two
;               interleave). Default false.
; serialdelay = minimum ms between successive characters loaded
;               into the KL11 TKB. Prevents back-to-back addchars
;               while the guest is still inside klrint on the
;               prior byte (which would re-enter klrint on sam11
;               and reverse the order). 0 disables; 10-50 ms
;               typical for V6 / RT-11 / RSTS under a line-
;               buffered host (Arduino IDE Serial Monitor).
pcping      = 0
tty_trace   = false
serialdelay = 10
v4b_quirks  = false
kwp_enabled = true

[disks]
; dl0, dl1 = RL02 10 MB removable disk packs.
; rk0      = RK05 2.5 MB disk pack (e.g. RT-11).
; rk0 uses a dedicated RK0 slot and does not replace dl0.
; Leave a slot blank to dismount it at boot.
dl0  = /rsxm32.dsk
dl1  = /rlutil.dsk
dl2  = /mcrsrc.dsk
dl3  = /excprv.dsk
rk0  = 
boot = rl0
