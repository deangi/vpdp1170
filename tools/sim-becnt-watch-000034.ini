; sim-becnt-watch-000034.ini — dump @000034 at finish-sw TSTB decision
;
; At @007034: TSTB 34(R5). When R5=0 this reads VA @000034 (TRAP vector
; low byte). ESP iter51: word=045642 / low=242₈ → N=1 → BMI finish-sw.
; Goal: same dump on SIMH + which branch (BMI@007042 vs BPL@007054).
;
; Quiet: no peal @004750, no ACTHD write flood. @007034/@007040 continue
; after dump; stop externally after STARTUP / Time-and-date or R5=0 hit.
;
; Avoid mid-echo ';' and "ex -v sp+N" on this SIMH build.
; Delete becnt-simh-000034.log before run.
;   PDP11.exe sim-becnt-watch-000034.ini
;   sim> boot rl0

detach all
reset all
set cpu 11/70, 1M
set idle

set tm disable
set hk disable
set rp disable

set rl0 rl02
attach rl0 rsx11mp46-rl02pg.dsk
set rl1 rl02
attach rl1 user.dsk

set dz enable
set dz lines=8
set dz address=17760030
set dz vec=330
attach dz 10001

set console log=becnt-simh-000034.log
nobreak all

; TSTB 34(R5) — dump R5 + word @000034 + ACTHD/TKTCB before CC update
break -e 007034;echo ==== E@007034 TSTB ====;ex r0-r5;ex sp;ex psw;ex -v 000034;ex -v 001032;ex -v 001060;ex -v 051100;continue

; BMI/BPL decision after TSTB (PS already updated)
break -e 007040;echo ==== E@007040 BPL/BMI ====;ex r0-r5;ex psw;ex -v 000034;ex -v 001032;ex -v 001060;continue

; BMI arm = finish-sw (ESP path when N=1)
break -e 007042;echo ==== E@007042 BMI ====;ex r0-r5;ex psw;ex -v 000034;ex -v 001032;ex -v 001060;continue

; BPL arm = abort (SIMH post historically always here)
break -e 007054;echo ==== E@007054 BPL ====;ex r0-r5;ex psw;ex -v 000034;ex -v 001032;continue

; Milestone: install return (confirm healthy path)
break -e 007506;echo ==== E@007506 ====;ex r0-r5;ex -v 001032;ex -v 001060;continue

show break
echo === boot rl0 — @000034 / finish-sw branch watch ===
