; sim-becnt-watch.ini — SIMH 11/70 golden-boot capture for BE.NCT compare
;
; WARNING: Write breakpoints (-w) on 057244/051100 etc. fire every scheduler
; tick (~60k+ hits, 30MB+ log in 20 min). Use sim-becnt-watch-lite.ini instead.
;
; Same RL02 / CPU as your working sim.ini, plus breakpoints that dump the
; switcher state we log on vpdp1170 (kek RSX watch).
;
; Run from: C:\Users\deang\OneDrive\emulators\pdp11\rsx11mplus
;   pdp11 sim-becnt-watch.ini
;   sim> boot rl0
;
; Output: becnt-simh.log (SET CONSOLE LOG)
; Each hit ECHO's a ==== E@PCxxxx ==== or ==== W@VAxxxx ==== marker,
; dumps regs/memory, then CONTINUE automatically.
;
; Break types (PDP-11): -e instruction VA, -r read VA, -w write VA.
; After ^E: SHOW BREAK / NOBREAK ALL / CONTINUE as needed.
;
; Octal VAs match vpdp1170 status.txt (SAVT0@057210, Null@051100).

detach all
reset all
set cpu 11/70, 1M
set idle
sho cpu

set tm disable
set hk disable
set rp disable

set rl0 rl02
attach rl0 rsx11mp46-rl02pg.dsk
set rl1 rl02
attach rl1 user.dsk

set dz enable
set dz lines=8
set dz address=17760030
set dz vec=330
attach dz 10001
sho dz

set console log=becnt-simh.log
echo === BE.NCT compare — log -> becnt-simh.log ===
echo Breaks CONTINUE after dump. Key delta: first post-banner 005172/005474/006420/007040

nobreak all

; ========== instruction fetch (PC) — switcher path ==========================

; WSIG BIS T2.WFR
break -e 043572;echo ==== E@043572 WSIG/WFR-BIS ====;ex r0-r5 sp psw;ex -v 001032;ex -v 001060;ex -v 057210/50;continue

; dir: TSTB T.ST2 then BPL@004706 ->004762 RTI when N=0
break -e 004702;echo ==== E@004702 dir TSTB T.ST2 ====;ex r0-r5 sp psw;ex -v 057244;continue
break -e 004706;echo ==== E@004706 dir BPL decision ====;ex r0-r5 sp psw;continue
break -e 004762;echo ==== E@004762 RTI no-switch ====;ex r0-r5 sp psw;ex -v 001032;ex -v 001060;continue

; peal MOV @$TKTCB,R5
break -e 004750;echo ==== E@004750 MOV @$TKTCB peal ====;ex r0-r5 sp psw;ex -v 001060;ex -v 051100;ex -v 001032;continue

; wake / DEC / CLR R4
break -e 005172;echo ==== E@005172 peal/TSTB ST2 ====;ex r0-r5 sp psw;ex -v 001032;ex -v 001060;ex -v 057210/50;ex -v 051100;continue
break -e 005200;echo ==== E@005200 wake BIT 66 vs @70 ====;ex r0-r5 sp psw;ex -v 057276;ex -v 057300;ex -v 057232;continue
break -e 005460;echo ==== E@005460 DEC ST2 ====;ex r0-r5 sp psw;ex -v 057244;continue
break -e 005466;echo ==== E@005466 after DEC ====;ex r0-r5 sp psw;ex -v 057244;continue
break -e 005474;echo ==== E@005474 CLR R4 ====;ex r0-r5 sp psw;continue

; ATL-head short path vs map-load @005536
break -e 005524;echo ==== E@005524 CMP R5,$ACTHD ====;ex r0-r5 sp psw;ex -v 001032;continue
break -e 005532;echo ==== E@005532 JMP short/map ====;ex r0-r5 sp psw;continue
break -e 005536;echo ==== E@005536 map-load fallthru ====;ex r0-r5 sp psw;ex -v 001032;continue

; install gates + R4nz -> 007060
break -e 006420;echo ==== E@006420 TST TCB+116 ====;ex r0-r5 sp psw;ex -v 057326;ex -v 001032;continue
break -e 006454;echo ==== E@006454 TST R4 ====;ex r0-r5 sp psw;continue
break -e 006464;echo ==== E@006464 R4nz install ====;ex r0-r5 sp psw;ex -v 001032;ex -v 001060;ex -v 057210/50;continue
break -e 007060;echo ==== E@007060 post-R4nz continue ====;ex r0-r5 sp psw;ex -v 001032;ex -v 001060;continue

; abort vs finish-sw
break -e 007040;echo ==== E@007040 switch BPL/BMI ====;ex r0-r5 sp psw;ex -v 057244;ex -v 001032;ex -v 001060;continue
break -e 007042;echo ==== E@007042 finish-sw BMI arm ====;ex r0-r5 sp psw;ex -v 001032;ex -v 001060;continue
break -e 007054;echo ==== E@007054 abort JMP epi ====;ex r0-r5 sp psw;continue
break -e 004646;echo ==== E@004646 abort epilogue ====;ex r0-r5 sp psw;ex -v 001032;ex -v 001060;ex -v 051100;continue

; ========== write watches DISABLED — caused ~60k W@ hits / huge log ==========
;break -w 057244;echo ==== W@057244 SAVT0 T.ST2 ====;ex r0-r5 sp psw pc;ex -v 057244;ex -v 001032;ex -v 001060;continue
;break -w 057326;echo ==== W@057326 SAVT0 TCB+116 ====;ex r0-r5 sp psw pc;ex -v 057326;ex -v 001032;continue
;break -w 051100;echo ==== W@051100 Null.T.LNK ====;ex r0-r5 sp psw pc;ex -v 051100;ex -v 001060;ex -v 001032;continue
;break -w 057232;echo ==== W@057232 SAVT0 EF/TCB+022 ====;ex r0-r5 sp psw pc;ex -v 057232;ex -v 057244;continue
; Very noisy — enable only if needed:
;break -w 001060;echo ==== W@001060 $TKTCB ====;ex r0-r5 sp psw pc;ex -v 001060;ex -v 001032;continue
;break -w 001032;echo ==== W@001032 $ACTHD ====;ex r0-r5 sp psw pc;ex -v 001032;ex -v 001060;continue

show break
echo === Ready. Type: boot rl0 ===
echo Compare ==== E@005172 ==== / ==== E@005474 ==== / ==== E@006420 ==== / ==== E@007040 ====
echo with vpdp1170: R4 R1 ST2@057244 $TKTCB@001060 $ACTHD@001032 TCB+116@057326
echo On SIMH first SAVT0 wake also aborts @007054 (R4=0, TCB+116=0); recovery is later.
