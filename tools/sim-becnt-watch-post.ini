; sim-becnt-watch-post.ini — quiet post-STARTUP ACTHD compare
;
; Dropped noisy @004750 / @007040. Keep install milestones + ACTHD writes
; + @007042 (ESP BMI path — should stay silent on SIMH).
;
; Delete becnt-simh-post.log before run.

detach all
reset all
set cpu 11/70, 1M
set idle

set tm disable
set hk disable
set rp disable

set rl0 rl02
attach rl0 rsx11mp46-rl02pg.dsk
set rl1 rl02
attach rl1 user.dsk

set dz enable
set dz lines=8
set dz address=17760030
set dz vec=330
attach dz 10001

set console log=becnt-simh-post.log
nobreak all

break -e 007506;echo ==== E@007506 ====;ex r0-r5;ex sp;ex -v 001032;ex -v 001060;continue
break -e 007042;echo ==== E@007042 BMI ====;ex r0-r5;ex sp;ex -v 001032;ex -v 001060;continue
break -w 001032;echo ==== W@ACTHD ====;ex r0-r5;ex pc;ex -v 001032;ex -v 001060;continue

show break
echo === boot rl0 — quiet ACTHD / 007042 watch ===
