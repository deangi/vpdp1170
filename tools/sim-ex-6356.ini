; sim-ex-6356.ini -- examine VA 006350-006370 / decode @006356 vs ESP 174105
; Run from rsx11mplus with PDP11.exe; log -> becnt-simh-6356.log
; Do NOT break-continue forever on hot paths; stop after enough samples.

detach all
reset all
set cpu 11/70, 1M
set idle

set tm disable
set hk disable
set rp disable

set rl0 rl02
attach rl0 rsx11mp46-rl02pg.dsk
set rl1 rl02
attach rl1 user.dsk

set dz enable
set dz lines=8
set dz address=17760030
set dz vec=330
attach dz 10001

set console log=becnt-simh-6356.log
nobreak all

; ACTHD install -- dump executive words once maps are live
break -e 005704;echo ==== E@005704 ACTHD-install ====;ex r0-r5;ex sp;ex pc;ex psw;ex -v 001032;ex -v 001060;ex 6350-6370;ex -v 6356;continue

; Suspect CLRT0 site: dump before insn, and after at next PC
break -e 006356;echo ==== E@006356 before ====;ex r0-r5;ex sp;ex pc;ex psw;ex -v 001032;ex -v 001060;ex 6350-6370;ex -v 6356;ex -v 6350/20;continue
break -e 006360;echo ==== E@006360 after-6356 ====;ex r0-r5;ex sp;ex pc;ex psw;ex -v 001032;continue

; Late ACTHD writes (value dump)
break -w 001032;echo ==== W@ACTHD ====;ex r0-r5;ex pc;ex -v 001032;ex -v 001060;ex 6350-6370;ex -v 6356;continue

show break
echo === boot rl0 -- watch 005704 / 006356 / 006360 / W@ACTHD ===
