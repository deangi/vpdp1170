; sim-becnt-watch-lite.ini — stop at @007506 (return after JSR R5 / 003224)
;
; Do NOT break on 003224 — it is a hot helper called constantly from early
; boot and will never reach the install path cleanly.
; Do NOT use "ex -v sp+N" — this SIMH rejects it (Invalid argument).
;
; Delete becnt-simh-lite.log before run.
;   pdp11 sim-becnt-watch-lite.ini
;   sim> boot rl0
; Wait for ==== STOPPED @007506 ==== then quit.

detach all
reset all
set cpu 11/70, 1M
set idle

set tm disable
set hk disable
set rp disable

set rl0 rl02
attach rl0 rsx11mp46-rl02pg.dsk
set rl1 rl02
attach rl1 user.dsk

set dz enable
set dz lines=8
set dz address=17760030
set dz vec=330
attach dz 10001

set console log=becnt-simh-lite.log
nobreak all

; Approach — dump and continue
break -e 005172;echo ==== E@005172 ====;ex r0-r5;ex sp;continue
break -e 005474;echo ==== E@005474 ====;ex r0-r5;ex sp;continue
break -e 006420;echo ==== E@006420 ====;ex r0-r5;ex sp;continue
break -e 006454;echo ==== E@006454 ====;ex r0-r5;ex sp;continue
break -e 007040;echo ==== E@007040 ====;ex r0-r5;ex sp;continue
break -e 007054;echo ==== E@007054 abort ====;ex r0-r5;ex sp;continue
break -e 006464;echo ==== E@006464 R4nz ====;ex r0-r5;ex sp;ex -v 001032;ex -v 001060;continue
break -e 007060;echo ==== E@007060 ====;ex r0-r5;ex sp;continue
break -e 007502;echo ==== E@007502 pre-JSR ====;ex r0-r5;ex sp;ex -v 000770/6;continue

; Terminal: PC after RTS from 003224 back to link address
break -e 007506;echo ==== E@007506 post-003224 ====;ex r0-r5;ex sp;ex psw;ex -v 001032;ex -v 001060;ex -v 000766/12;ex -v 007506/10;echo ==== STOPPED at 007506 — type quit ====

show break
echo === boot rl0 — pauses at first 007506; then quit ===
